# Jira Done on Merge
#
# Automatically transitions a Jira ticket to "Done" when a PR is merged to main.
# Extracts the ticket key from the branch name or PR title using [A-Z]+-[0-9]+ pattern.
#
# Required GitHub Secrets:
#   JIRA_BASE_URL   — Jira instance URL, e.g. https://yourorg.atlassian.net
#   JIRA_USER_EMAIL — Jira account email used for API authentication
#   JIRA_API_TOKEN  — API token from https://id.atlassian.com/manage-profile/security/api-tokens

name: Jira Done on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  transition-to-done:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Extract ticket key
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          TITLE="${{ github.event.pull_request.title }}"

          # Try branch name first
          TICKET_KEY=$(echo "$BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1 || true)

          # Fall back to PR title
          if [ -z "$TICKET_KEY" ]; then
            TICKET_KEY=$(echo "$TITLE" | grep -oE '[A-Z]+-[0-9]+' | head -1 || true)
          fi

          if [ -z "$TICKET_KEY" ]; then
            echo "No Jira ticket key found — skipping transition"
          else
            echo "Found ticket key: $TICKET_KEY"
          fi

          echo "ticket_key=$TICKET_KEY" >> $GITHUB_OUTPUT

      - name: Find Done transition ID
        id: find-transition
        if: steps.extract.outputs.ticket_key != ''
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          TICKET_KEY="${{ steps.extract.outputs.ticket_key }}"
          AUTH=$(echo -n "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" | base64 -w 0)

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            "${JIRA_BASE_URL}/rest/api/3/issue/${TICKET_KEY}/transitions")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::warning::Failed to fetch transitions for ${TICKET_KEY} (HTTP ${HTTP_CODE}): ${BODY}"
            echo "transition_id=" >> $GITHUB_OUTPUT
            exit 0
          fi

          TRANSITION_ID=$(echo "$BODY" | jq -r '.transitions[] | select(.name == "Done") | .id' | head -1)

          if [ -z "$TRANSITION_ID" ] || [ "$TRANSITION_ID" = "null" ]; then
            echo "No 'Done' transition found for ${TICKET_KEY} — ticket may already be Done or status does not exist"
            echo "transition_id=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Found Done transition ID: $TRANSITION_ID"
          echo "transition_id=$TRANSITION_ID" >> $GITHUB_OUTPUT

      - name: Transition to Done
        if: steps.extract.outputs.ticket_key != '' && steps.find-transition.outputs.transition_id != ''
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          TICKET_KEY="${{ steps.extract.outputs.ticket_key }}"
          TRANSITION_ID="${{ steps.find-transition.outputs.transition_id }}"
          AUTH=$(echo -n "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" | base64 -w 0)

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Basic ${AUTH}" \
            -H "Content-Type: application/json" \
            -d "{\"transition\":{\"id\":\"${TRANSITION_ID}\"}}" \
            "${JIRA_BASE_URL}/rest/api/3/issue/${TICKET_KEY}/transitions")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Successfully transitioned ${TICKET_KEY} to Done"
          else
            echo "::warning::Failed to transition ${TICKET_KEY} to Done (HTTP ${HTTP_CODE}): ${BODY}"
          fi
